services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linknest
      POSTGRES_PASSWORD: linknest
      POSTGRES_DB: linknest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://linknest:linknest@postgres:5432/linknest
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-me-in-production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
